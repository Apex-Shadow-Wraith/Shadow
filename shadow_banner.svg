<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0c"/>
      <stop offset="40%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6914"/>
      <stop offset="40%" style="stop-color:#c9a84c"/>
      <stop offset="60%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <linearGradient id="gold2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b5010"/>
      <stop offset="50%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#6b5010"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#c9a84c;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="panelDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="silhouetteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="bannerClip">
      <rect width="900" height="300"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">

    <!-- Deep black base -->
    <rect width="900" height="300" fill="url(#bg)"/>

    <!-- Subtle dark panel overlays for depth -->
    <polygon points="0,0 350,0 180,300 0,300" fill="url(#panelDark)" opacity="0.5"/>
    <polygon points="900,0 900,300 650,300 820,0" fill="url(#panelDark)" opacity="0.5"/>

    <!-- === Sharp angular gold lines — top left cluster === -->
    <line x1="-20" y1="80" x2="280" y2="-30" stroke="url(#gold1)" stroke-width="1.2"/>
    <line x1="-20" y1="120" x2="220" y2="-20" stroke="url(#gold2)" stroke-width="0.6" opacity="0.5"/>
    <line x1="30" y1="300" x2="200" y2="60" stroke="url(#gold1)" stroke-width="0.8" opacity="0.35"/>

    <!-- === Sharp angular gold lines — bottom right cluster === -->
    <line x1="620" y1="330" x2="920" y2="220" stroke="url(#gold1)" stroke-width="1.2"/>
    <line x1="680" y1="320" x2="930" y2="180" stroke="url(#gold2)" stroke-width="0.6" opacity="0.5"/>
    <line x1="750" y1="300" x2="870" y2="30" stroke="url(#gold1)" stroke-width="0.8" opacity="0.35"/>

    <!-- === Accent slash — top right === -->
    <line x1="800" y1="-10" x2="860" y2="70" stroke="url(#gold2)" stroke-width="0.5" opacity="0.3"/>
    <line x1="830" y1="-10" x2="890" y2="50" stroke="url(#gold1)" stroke-width="0.8" opacity="0.2"/>

    <!-- === Accent slash — bottom left === -->
    <line x1="40" y1="240" x2="100" y2="310" stroke="url(#gold2)" stroke-width="0.5" opacity="0.3"/>
    <line x1="70" y1="250" x2="120" y2="310" stroke="url(#gold1)" stroke-width="0.8" opacity="0.2"/>

    <!-- === Shadow figure silhouette (hooded, abstract, minimal) === -->
    <g transform="translate(450, 60)" opacity="0.08">
      <!-- Hood/head shape -->
      <path d="M0,-25 C-18,-25 -28,-10 -28,5 C-28,12 -22,18 -15,22 L-12,75 L12,75 L15,22 C22,18 28,12 28,5 C28,-10 18,-25 0,-25 Z" fill="#c9a84c"/>
      <!-- Shoulders -->
      <path d="M-12,75 C-12,75 -45,85 -50,100 L50,100 C45,85 12,75 12,75" fill="#c9a84c"/>
    </g>

    <!-- Long cast shadow from the figure — stretching down and to the right -->
    <g opacity="0.04">
      <polygon points="450,135 465,135 530,300 440,300" fill="#c9a84c"/>
    </g>

    <!-- === Thin horizontal rule === -->
    <line x1="280" y1="192" x2="620" y2="192" stroke="url(#goldSoft)" stroke-width="0.8"/>

    <!-- === Main title === -->
    <text x="450" y="165" text-anchor="middle" font-family="'Georgia','Garamond','Times New Roman',serif" font-size="58" font-weight="bold" fill="#c9a84c" letter-spacing="22">SHADOW</text>

    <!-- === Subtitle === -->
    <text x="450" y="215" text-anchor="middle" font-family="'Georgia','Garamond','Times New Roman',serif" font-size="11" fill="#c9a84c" letter-spacing="7" opacity="0.7">AUTONOMOUS  AI  AGENT  SYSTEM</text>

    <!-- === Bottom tagline === -->
    <text x="450" y="265" text-anchor="middle" font-family="'Courier New','SF Mono',monospace" font-size="8.5" fill="#5a4a20" letter-spacing="3">ONE AGENT · ONE IDENTITY · 13 MODULES · ZERO CLOUD DEPENDENCY</text>

    <!-- Thin border -->
    <rect x="12" y="12" width="876" height="276" fill="none" stroke="#c9a84c" stroke-width="0.4" opacity="0.12"/>

  </g>
</svg>
