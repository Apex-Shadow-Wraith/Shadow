# ============================================================
# Shadow Master Configuration
# Windows Development Build — April 2026
# ============================================================
# This config matches the architecture interfaces from the Unified
# Module Architecture doc. When we move to Ubuntu + dual 5090s,
# we change values here — not code.

system:
  name: "Shadow"
  version: "0.1.0"
  environment: "development"
  platform: "auto"  # Resolved at runtime via platform.system()
  log_level: "INFO"
  state_file: "data/shadow_state.json"
  timezone: "America/Chicago"  # Central Time — used for all user-facing time displays

# --- Model Configuration ---
# Gemma 4 26B for all brains on Windows dev
# Ubuntu target: smaller/faster router + Qwen 3.5 35B (fast) + Scout (smart)
models:
  ollama_base_url: "http://localhost:11434"

  router:
    name: "gemma4:26b"  # TODO: replace with smaller/faster model for routing
    purpose: "Task classification and routing (Step 2)"
    always_loaded: true

  fast_brain:
    name: "gemma4:26b"
    purpose: "Daily tasks via Wraith (80% of work)"
    # Ubuntu target: qwen3.5-35b-a3b

  smart_brain:
    name: "gemma4:26b"
    purpose: "Complex reasoning (Cipher, Omen, research)"
    # Ubuntu target: llama4-scout (1.78-bit quantized)

  embedding:
    name: "nomic-embed-text"
    purpose: "Semantic search for Grimoire"
    always_loaded: true

# --- Module Configuration ---
# Which modules to load at startup. Matches architecture:
# Always running: grimoire, cerberus
# On demand: reaper (loaded at startup for dev convenience)
modules:
  load_on_startup:
    - "grimoire"
    - "cerberus"
    - "wraith"
    - "reaper"
    - "harbinger"
    - "apex"
    - "cipher"
    - "omen"
    - "sentinel"
    - "void"
    - "nova"
    - "morpheus"

  # Module-specific settings
  grimoire:
    db_path: "data/memory/shadow_memory.db"
    vector_path: "data/vectors"
    collection_name: "shadow_memories"
    max_search_results: 5

  cerberus:
    limits_file: "config/cerberus_limits.yaml"
    log_all_checks: true
    # Phase 1: config-only, no LLM judgment for ambiguous cases
    use_llm_judgment: false

  reaper:
    search_backends:
      - "duckduckgo"
      - "bing"
    max_results_per_query: 5
    stealth_mode: true
    # SearXNG deferred to Ubuntu Phase 1
    searxng_enabled: false

# --- Path Configuration ---
paths:
  data_dir: "data"
  memory_dir: "data/memory"
  vector_dir: "data/vectors"
  logs_dir: "logs"
  config_dir: "config"
  modules_dir: "modules"

# --- Decision Loop Settings ---
decision_loop:
  max_retries: 12
  # Context loading: how many memories to pull in Step 3
  context_memories: 5
  # Router classification timeout (seconds)
  router_timeout: 30
  # Tool execution timeout (seconds)
  tool_timeout: 60
  # Max tokens for LLM response generation (num_predict)
  # 2048 is safe for most responses; increase for long code output
  max_response_tokens: 2048
  # Save state after every interaction
  persist_state: true

# --- Context Window Management ---
context_limits:
  # Tokens reserved for the model's response (never used by context)
  reserve_tokens: 4096
  # Model-specific context window sizes (tokens)
  # Add/override entries here — ContextManager uses these at runtime
  model_context_limits:
    "gemma4:26b": 256000
    "qwen3.5:35b-a3b": 262144
    "phi4-mini": 16384
    "nomic-embed-text": 8192

# --- Priority System ---
priorities:
  # P1: User requests (highest, non-negotiable)
  # P2: Shadow's autonomous learning (standing mission)
  # P3: Scheduled tasks (research, briefings, backups)
  # P4: Background maintenance (dedup, log rotation)
  current_mode: "interactive"  # interactive = P1 only for now
