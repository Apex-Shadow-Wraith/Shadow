# SearXNG Settings for Shadow/Reaper
use_default_settings: true

general:
  instance_name: "Shadow Search"
  debug: false

search:
  formats:
    - html
    - json
  default_lang: "en"
  safe_search: 0

server:
  secret_key: "shadow-searxng-local-key-change-me"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

engines:
  - name: google
    engine: google
    disabled: false
  - name: bing
    engine: bing
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
  - name: brave
    engine: brave
    disabled: false
  - name: reddit
    engine: reddit
    disabled: false
  - name: github
    engine: github
    disabled: false
  - name: arxiv
    engine: arxiv
    disabled: false
  - name: stackoverflow
    engine: stackoverflow
    disabled: false
